# 3MS Speed-Limiting Configuration
# by 3DCoded

### --- INTERNAL SETTINGS (DO NOT EDIT) --- ###
[gcode_macro SPEEDLIMIT_SETTINGS]
variable_prev_load_speed: -1
variable_prev_unload_speed: -1
gcode:
    RESPOND MSG=""

### --- MACROS (DO NOT EDIT) --- ###
[gcode_macro SPEEDLIMIT_INIT]
    SET_GCODE_VARIABLE MACRO=SPEEDLIMIT_SETTINGS VARIABLE=prev_load_speed VALUE={printer["gcode_macro MMMS_SETTINGS"].load_speed}
    SET_GCODE_VARIABLE MACRO=SPEEDLIMIT_SETTINGS VARIABLE=prev_unload_speed VALUE={printer["gcode_macro MMMS_SETTINGS"].unload_speed}
    RESPOND MSG="3MS Speed Limiting Initialized"

[delayed_gcode]
initial_duration: 1
gcode:
    SPEEDLIMIT_INIT

[gcode_macro SPEEDLIMIT_ENABLE]
gcode:
    {% set load_speed = params.LOAD_SPEED|int %}
    {% set unload_speed = params.UNLOAD_SPEED|int %}
    SET_MMMS_SETTINGS LOAD_SPEED={load_speed} UNLOAD_SPEED={unload_speed}

[gcode_macro SPEEDLIMIT_DISABLE]
gcode:
    {% set prev_settings = get_macro_variables("SPEEDLIMIT_SETTINGS") %}
    SET_MMMS_SETTINGS LOAD_SPEED={prev_settings.load_speed} UNLOAD_SPEED={prev_settings.unload_speed}